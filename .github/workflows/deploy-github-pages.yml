# Build and deploy the Vike (Vite) app to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Repo → Actions → run workflow manually if Pages never deployed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Vike / rolldown expect Node >= 20.19 (22.x is safe on ubuntu-latest).
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        run: npm run sitemap

      # Custom domain (CNAME) is served at site root — base must be `/`, not `/repo/`.
      # Optional override: Repo → Settings → Variables → Actions → VITE_BASE_PATH (e.g. / or /repo/)
      - name: Set Vite base path for Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          VITE_BASE_PATH_VAR: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$VITE_BASE_PATH_VAR" ]; then
            echo "VITE_BASE_PATH=$VITE_BASE_PATH_VAR" >> "$GITHUB_ENV"
          elif [ -f CNAME ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          elif [ "$REPO_NAME" = "${REPO_OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      # After prerender, root `index.html` should exist under dist/client.
      # Keep `404.html` as fallback for any non-pre-rendered deep links.
      - name: SPA fallback + choose Pages root
        run: |
          set -euo pipefail
          if [[ -f dist/client/index.html ]]; then
            ROOT=dist/client
          elif [[ -f dist/index.html ]]; then
            ROOT=dist
          else
            echo '::error::No index.html after build. Ensure pages/+config enables prerender (e.g. partial: true) and pages/app opts in.'
            find dist -type f -name '*.html' 2>/dev/null | head -50 || true
            ls -la dist dist/client 2>/dev/null || true
            exit 1
          fi
          cp "$ROOT/index.html" "$ROOT/404.html"
          echo "PAGES_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ROOT }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
