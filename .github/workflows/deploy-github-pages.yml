# Build and deploy the Vike (Vite) app to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Repo → Actions → run workflow manually if Pages never deployed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Vike / rolldown expect Node >= 20.19 (22.x is safe on ubuntu-latest).
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Custom domain (CNAME) is served at site root — base must be `/`, not `/repo/`.
      # Optional override: Repo → Settings → Variables → Actions → VITE_BASE_PATH (e.g. / or /repo/)
      - name: Set Vite base path for Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          VITE_BASE_PATH_VAR: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$VITE_BASE_PATH_VAR" ]; then
            echo "VITE_BASE_PATH=$VITE_BASE_PATH_VAR" >> "$GITHUB_ENV"
          elif [ -f CNAME ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          elif [ "$REPO_NAME" = "${REPO_OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      # # Vike emits the static client site under dist/client (not dist/).
      # - name: SPA fallback (deep links on GitHub Pages)
      #   run: cp dist/client/index.html dist/client/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
